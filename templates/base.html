<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bens Basil | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            white: '#ffffff',
                            dark: '#1a1a1a',
                            green: '#2bd6a9',
                            coral: '#f77662',
                            light: '#f4f4f5',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    transitionTimingFunction: {
                        'premium': 'cubic-bezier(0.22, 1, 0.36, 1)',
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff;
            color: #18181b;
        }
        .nav-blur {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #f4f4f5;
        }

        /* --- LOGO ANIMATION --- */
        .logo-container {
            perspective: 1200px;
        }

        .expansion-wrapper {
            display: inline-flex;
            max-width: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-width 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
        }

        /* Expand the container on hover */
        .group:hover .expansion-wrapper {
            max-width: 300px; /* Adjust based on font size */
            opacity: 1;
        }

        .flip-letter {
            display: inline-block;
            opacity: 0;
            /* Starting State: Inverted and slightly below */
            transform: rotateX(180deg) translateY(25px); 
            filter: blur(4px);
        }

        /* Trigger the "straighten" animation on hover */
        .group:hover .flip-letter {
            animation: straighten 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            /* Stagger based on --i variable */
            animation-delay: calc(var(--i) * 0.07s);
        }

        @keyframes straighten {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
                transform: rotateX(0deg) translateY(0);
                filter: blur(0);
            }
        }
    </style>
</head>
<body class="text-zinc-600 antialiased selection:bg-blue-100 selection:text-blue-700">

    <nav class="nav-blur fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            
            <a href="{% url 'home' %}" class="group logo-container relative flex items-center text-black font-bold text-xl tracking-tighter overflow-hidden whitespace-nowrap">
                <span class="z-10 bg-white">B</span>

                <span class="expansion-wrapper">
                    <span class="flex">
                        <span class="flip-letter" style="--i:1">e</span>
                        <span class="flip-letter" style="--i:2">n</span>
                        <span class="flip-letter" style="--i:3">s</span>
                    </span>
                </span>

                <span class="z-10 bg-white ml-[2px]">B</span>

                <span class="expansion-wrapper">
                    <span class="flex">
                        <span class="flip-letter" style="--i:4">a</span>
                        <span class="flip-letter" style="--i:5">s</span>
                        <span class="flip-letter" style="--i:6">i</span>
                        <span class="flip-letter" style="--i:7">l</span>
                    </span>
                </span>

                <span class="text-blue-600">.</span>
            </a>
            
            <div class="hidden md:flex items-center space-x-10 text-[13px] font-bold tracking-wide uppercase">
                <a href="{% url 'home' %}#about" class="text-zinc-500 hover:text-black transition">About</a>
                <a href="{% url 'home' %}#services" class="text-zinc-500 hover:text-black transition">Services</a>
                <a href="{% url 'home' %}#projects" class="text-zinc-500 hover:text-black transition">Projects</a>
                <a href="{% url 'contact' %}" class="bg-black text-white px-6 py-2.5 rounded-full hover:bg-zinc-800 transition duration-300 shadow-lg shadow-black/10">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-6xl mx-auto px-6 border-t border-zinc-100 py-12 flex flex-col md:flex-row justify-between items-center gap-6 text-[12px]">
        <p class="text-zinc-400">&copy; 2026 Built with Django & Tailwind. Inspired by Simon.</p>
        <div class="flex space-x-6 uppercase tracking-widest font-bold text-zinc-900">
            <a href="#" class="hover:text-blue-600 transition">LinkedIn</a>
            <a href="#" class="hover:text-blue-600 transition">GitHub</a>
        </div>
    </footer>
</body>
</html>
