<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.B. | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff; /* Pure White Background */
            color: #18181b; /* Zinc 900 for Primary Text */
        }
        .nav-blur {
            background: rgba(255, 255, 255, 0.8); /* Light Blur */
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #f4f4f5; /* Zinc 100 border */
        }
    </style>
</head>
<body class="text-zinc-600 antialiased selection:bg-blue-100 selection:text-blue-700">

    <nav class="nav-blur fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="text-black font-bold text-xl tracking-tighter hover:opacity-70 transition">S.B<span class="text-blue-600">.</span></a>
            
            <div class="hidden md:flex items-center space-x-10 text-[13px] font-bold tracking-wide uppercase">
                <a href="#about" class="text-zinc-500 hover:text-black transition">About</a>
                <a href="#services" class="text-zinc-500 hover:text-black transition">Services</a>
                <a href="#projects" class="text-zinc-500 hover:text-black transition">Projects</a>
                <a href="{% url 'contact' %}" class="bg-black text-white px-6 py-2.5 rounded-full hover:bg-zinc-800 transition duration-300 shadow-lg shadow-black/10">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-6xl mx-auto px-6 border-t border-zinc-100 py-12 flex flex-col md:flex-row justify-between items-center gap-6 text-[12px]">
        <p class="text-zinc-400">&copy; 2026 Built with Django & Tailwind. Inspired by Simon.</p>
        <div class="flex space-x-6 uppercase tracking-widest font-bold text-zinc-900">
            <a href="#" class="hover:text-blue-600 transition">LinkedIn</a>
            <a href="#" class="hover:text-blue-600 transition">GitHub</a>
        </div>
    </footer>
</body>
</html>
