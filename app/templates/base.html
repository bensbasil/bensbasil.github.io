<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bens Basil | Portfolio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            white: '#ffffff',
                            dark: '#1a1a1a',
                            green: '#2bd6a9',
                            coral: '#f77662',
                            light: '#f4f4f5',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    transitionTimingFunction: {
                        'premium': 'cubic-bezier(0.22, 1, 0.36, 1)',
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
    body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        background-color: #ffffff;
        color: #18181b;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
    }

    .parallax-wrapper {
        clip-path: inset(0);
        position: relative;
    }

    .parallax-bg {
        height: 120%;
        top: -10%;
        will-change: transform;
    }

    .nav-blur {
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(15px);
    }

    /* --- NEW SILVER TEXT STYLE --- */
    .silver-text {
        color: #d4d4d8; /* Zinc-300 */
        text-shadow: 
            1px 1px 0px #a1a1aa, 
            2px 2px 0px #71717a, 
            3px 3px 5px rgba(0,0,0,0.5);
        background: linear-gradient(to bottom, #f4f4f5 0%, #a1a1aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block; /* Helps with gradient rendering */
    }

    /* --- PREMIUM IMAGE EFFECTS --- */
    .hero-image-container {
        overflow: hidden;
        background-color: #000000;
    }

    .premium-hero-img {
        transition: transform 1.5s cubic-bezier(0.22, 1, 0.36, 1), filter 1s ease;
        will-change: transform, filter;
    }

    /* Subtle "Ken Burns" Zoom & Color Shift on Hover */
    .hero-image-container:hover .premium-hero-img {
        transform: scale(1.05); /* Slight zoom in */
        filter: grayscale(0%) brightness(110%); /* Fade from gray to color */
    }

    .vignette-overlay {
        position: absolute;
        inset: 0;
        z-index: 10;
        /* Stronger gradient to make silver text pop */
        background: radial-gradient(circle at 70% 30%, transparent 0%, rgba(0,0,0,0.8) 100%);

    /* --- LOGO ANIMATION --- */
    .logo-container { perspective: 1200px; }
    .expansion-wrapper {
        display: inline-flex;
        max-width: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-width 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
    }
    .group:hover .expansion-wrapper { max-width: 300px; opacity: 1; }
    .flip-letter {
        display: inline-block;
        opacity: 0;
        transform: rotateX(180deg) translateY(25px); 
        filter: blur(4px);
    }
    .group:hover .flip-letter {
        animation: straighten 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        animation-delay: calc(var(--i) * 0.07s);
    }
    @keyframes straighten {
        0% { opacity: 0; }
        100% { opacity: 1; transform: rotateX(0deg) translateY(0); filter: blur(0); }
    }
</style>
</head>
<body class="text-zinc-600 antialiased selection:bg-brand-green selection:text-brand-dark">

    <nav class="bg-[#000000] fixed top-0 w-full z-50">
    <div class="max-w-full mx-auto px-12 h-24 flex items-center justify-between">
        
        <a href="{% url 'home' %}" class="relative flex items-center text-white font-bold text-lg tracking-tighter whitespace-nowrap hover:text-zinc-300 transition-colors">
            <span class="silver-text">Bens Basil</span>
            <span class="text-brand-green">.</span>
        </a>

        <div class="hidden md:flex items-center space-x-12 text-[11px] font-bold tracking-[0.2em] uppercase">
            <a href="{% url 'home' %}#about" class="text-zinc-400 hover:text-white transition">About</a>
            <a href="{% url 'home' %}#services" class="text-zinc-400 hover:text-white transition">Services</a>
            
            <a href="{% url 'contact' %}" class="bg-brand-green text-brand-dark px-6 py-2.5 rounded-full font-bold hover:opacity-90 transition shadow-lg shadow-brand-green/10">
                Contact
            </a>
        </div>
    </div>
</nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-7xl mx-auto px-6 border-t border-zinc-100 py-12 flex flex-col md:flex-row justify-between items-center gap-6 text-[12px]">
        <p class="text-zinc-400">&copy; 2026 Built with Django & Tailwind.</p>
        
        <div class="flex items-center space-x-8">
            <a href="https://github.com/bensbasil" target="_blank" rel="noopener noreferrer" class="group flex items-center space-x-2 text-zinc-900 hover:text-brand-green transition-all duration-300">

                <span class="uppercase tracking-[0.2em] font-bold">GitHub</span>
            </a>

            <a href="https://linkedin.com/in/bensbasil" target="_blank" rel="noopener noreferrer" class="group flex items-center space-x-2 text-zinc-900 hover:text-brand-green transition-all duration-300">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

            </a>
        </div>
    </footer>
</body>
</html>
