version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/portfolio_db
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - db
      - mlflow

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./quiz:/usr/share/nginx/html/quiz
      - ./:/usr/share/nginx/html/
    depends_on:
      - backend

  mlflow:
    image: python:3.9-slim
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow psycopg2-binary && 
      mlflow server --backend-store-uri postgresql://admin:adminpassword@db:5432/portfolio_db --default-artifact-root /mlflow --host 0.0.0.0"
    depends_on:
      - db
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data:
